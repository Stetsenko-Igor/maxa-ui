name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Token audit
        run: pnpm audit:tokens

      - name: Token reference freshness
        run: pnpm tokens:reference:check

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm --filter @maxa/ui test:coverage

      - name: Build
        run: pnpm build
